<!doctype html>
<html>
  <body>
    <style>
      .subscribe-button {
        background-color: rgb(225, 0, 0);
        color: white;
        border: none;
        height: 35px;
        width: 100px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 10px;
      }
      .join-button {
        background-color: white;
        border-style: solid;
        border-color: rgb(0, 133, 177);
        border-width: 1px;
        color: rgb(0, 133, 177);
        height: 35px;
        width: 70px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 10px;
      }
      .tweet-button {
        background-color: rgb(0, 133, 177);
        color: white;
        border: none;
        height: 35px;
        width: 80px;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>

    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>
  </body>
</html>
