<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <style>
      .subscribe-button {
        background-color: rgb(204, 0, 0);
        color: white;
        border: none;
        height: 30px;
        width: 100px;
        border-radius: 3px;
        cursor: pointer;
        margin: 10px;
      }
      .subscribe-button:hover {
        background-color: brown;
      }

      .join-button {
        background-color: white;
        border-color: rgb(6, 95, 212);
        border-style: solid;
        border-width: 1px;
        color: rgb(6, 95, 212);
        height: 30px;
        width: 100px;
        border-radius: 3px;
        cursor: pointer;
        margin: 10px;
      }
      .tweet-button {
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        height: 30px;
        width: 100px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        margin: 10px;
      }
      .add-to-cart {
        background-color: rgba(255, 208, 0, 0.768);
        border: none;
        height: 30px;
        width: 100px;
        font-weight: bold;
        border-radius: 50px;
        margin: 10px;
      }
      .save {
        background-color: white;
        height: 30px;
        width: 100px;
        margin: 10px;
        border-color: rgb(10, 150, 200);
        border-radius: 15px;
        border-style: solid;
        font-weight: bold;
        color: rgb(10, 150, 200);
      }
      .get-started {
        background-color: rgba(5, 63, 255, 0.736);
        color: white;
        font-weight: bold;
        height: 30px;
        width: 100px;
        border-radius: 3px;
        border: none;
        margin: 10px;
      }
      .sign-up {
        background-color: rgb(36, 145, 28);
        color: white;
        height: 30px;
        width: 100px;
        border: none;
        border-radius: 3px;
        font-weight: bold;
        margin: 10px;
      }
      .requeset-now {
        background-color: black;
        color: white;
        height: 30px;
        width: 100px;
        margin: 10px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>
    <button class="add-to-cart">Add to Cart</button>
    <button class="save">Save</button>
    <button class="get-started">Get started</button>
    <button class="sign-up">Sign up</button>
    <button class="requeset-now">Request now</button>
  </body>
</html>
